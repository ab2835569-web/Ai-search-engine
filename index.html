brainIcon.onclick = () => { aiModal.style.display = 'block'; chatInput.focus(); };  
closeChat.onclick = () => { aiModal.style.display = 'none'; };  
  
localBtn.onclick = () => {  
  if(mode === 'local') return;  
  mode = 'local';  
  localBtn.classList.add('active');  
  powerfulBtn.classList.remove('active');  
  chatFooter.style.display = 'flex';  
  chatBody.innerHTML = '';  
  addAiMessage('আসসালামু আলাইকুম! Local Mode চালু হয়েছে। 🌹');

powerfulBtn.onclick = () => {  
  if(mode === 'powerful') return;  
  mode = 'powerful';

  localBtn.classList.remove('active');  
  chatFooter.style.display = 'none';

  const div = document.createElement('div');

  div.innerHTML = text;   
  chatBody.appendChild(div);  
  scrollToBottom();

  chatBody.appendChild(div);  
  scrollToBottom();  
}  
  
function removeTyping() {  
  const typing = document.getElementById('typingIndicator');  
  if(typing) typing.remove();  
}

  chatBody.scrollTop = chatBody.scrollHeight;

function getSmartReply(input) {  
  const lowerInput = input.toLowerCase();  
    
  for (let item of knowledgeBase) {  
    for (let key of item.keywords) {  
      if (lowerInput.includes(key)) {  
        return item.response;  
      }  
    }  
  }  
    
  // Default Replies (Polite & Islamic tone)  
  const defaults = [  
    "দুঃখিত, আমি ঠিক বুঝতে পারিনি। তবে আল্লাহ সব জানেন। আরেকবার বলবেন?",

  ];  
  return defaults[Math.floor(Math.random() * defaults.length)];  
}  
  
// Handle Send  
sendBtn.onclick = () => {

  }  
};

  if(e.key === 'Enter'){ sendBtn.click(); }
