<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal AI Search Engine</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #0f172a;
            color: #e2e8f0;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            margin: 0;
        }
        .container {
            width: 100%;
            max-width: 800px;
        }
        h1 {
            text-align: center;
            color: #38bdf8;
            font-size: 2.5rem;
            margin-bottom: 30px;
        }
        .search-container {
            display: flex;
            gap: 10px;
            background: #1e293b;
            padding: 10px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: white;
            font-size: 18px;
            padding: 10px;
        }
        button {
            background: #38bdf8;
            color: #0f172a;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover {
            background: #0ea5e9;
            transform: translateY(-2px);
        }
        #loading {
            display: none;
            text-align: center;
            margin-top: 20px;
            color: #38bdf8;
        }
        #result {
            margin-top: 30px;
            background: #1e293b;
            padding: 25px;
            border-radius: 12px;
            line-height: 1.8;
            white-space: pre-wrap;
            border: 1px solid #334155;
            display: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .error {
            color: #ef4444;
            border-color: #ef4444;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>AI Search</h1>
    
    <div class="search-container">
        <input type="text" id="query" placeholder="যেকোনো প্রশ্ন লিখুন...">
        <button onclick="askAI()" id="btn">সার্চ করুন</button>
    </div>

    <div id="loading">অনুসন্ধান চলছে, দয়া করে অপেক্ষা করুন...</div>
    <div id="result"></div>
</div>

<script>
    async function askAI() {
        const queryInput = document.getElementById('query');
        const resultDiv = document.getElementById('result');
        const loadingDiv = document.getElementById('loading');
        const btn = document.getElementById('btn');

        const query = queryInput.value.trim();
        if (!query) return;

        // UI Preparation
        resultDiv.style.display = "none";
        resultDiv.classList.remove('error');
        loadingDiv.style.display = "block";
        btn.disabled = true;

        const API_KEY = "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";
        
        // CORS সমস্যা এড়াতে 'cors-anywhere' বা সরাসরি Groq এপিআই চেষ্টা করা হচ্ছে
        // Groq সরাসরি ব্রাউজার সাপোর্ট করলে এটা কাজ করবে, না হলে প্রক্সি লাগবে।
        
        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${API_KEY}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    model: "llama-3.1-8b-instant",
                    messages: [{ role: "user", content: query }],
                    temperature: 0.7
                })
            });

            const data = await response.json();

            if (response.ok) {
                resultDiv.innerText = data.choices[0].message.content;
                resultDiv.style.display = "block";
            } else {
                throw new Error(data.error ? data.error.message : "API Error");
            }

        } catch (error) {
            console.error(error);
            resultDiv.innerText = "Error: ব্রাউজার সিকিউরিটি (CORS) রিকোয়েস্টটি ব্লক করছে। \n\nসমাধান: \n১. ব্রাউজারে 'Allow CORS' এক্সটেনশন ব্যবহার করুন। \n২. অথবা Local Server (Live Server) দিয়ে ফাইলটি রান করুন।";
            resultDiv.classList.add('error');
            resultDiv.style.display = "block";
        } finally {
            loadingDiv.style.display = "none";
            btn.disabled = false;
        }
    }

    // Enter key support
    document.getElementById('query').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') askAI();
    });
</script>

</body>
</html>
